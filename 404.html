<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Temporarily Closed | The Celtic Couple</title>

  <link rel="icon" href="images/favicon (1).ico" type="image/x-icon" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      font-family: "Open Sans", sans-serif;
      background: #fffaf5;
      color: #4B0D0D;
    }

    header {
      background: #4B0D0D;
      padding: 14px 0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    }

    .logo {
      width: 55px;
      height: 55px;
      object-fit: cover;
    }

    .site-title {
      color: #fff;
      font-weight: 700;
      font-size: 1.25rem;
      margin-left: 12px;
    }

    .shutdown-section {
      min-height: calc(100vh - 170px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }

    .shutdown-card {
      max-width: 720px;
      background: #fff;
      border: 2px solid #DCCCE8;
      border-radius: 20px;
      padding: 50px 30px;
      box-shadow: 0 12px 35px rgba(75,13,13,0.12);
    }

    .shutdown-card h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 20px;
      color: #4B0D0D;
    }

    .shutdown-card p {
      font-size: 1.15rem;
      line-height: 1.7;
      margin-bottom: 10px;
      color: #5d2525;
    }

    .small-note {
      margin-top: 25px;
      font-size: 0.95rem;
      color: #7a4a4a;
    }

    footer {
      background: #4B0D0D;
      color: #fff;
      text-align: center;
      padding: 24px 15px;
    }

    footer a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      color: #DCCCE8;
    }
  </style>
</head>

<body>
  <header>
    <div class="container d-flex align-items-center justify-content-center">
      
      <span class="site-title">The Celtic Couple</span>
    </div>
  </header>

  <main class="shutdown-section">
    <div class="shutdown-card">
      <h1>Website Temporarily Closed</h1>
      <p>The Celtic Couple website is currently unavailable.</p>
      <p>We will be back soon.</p>
      <div class="small-note">Thank you for your patience.</div>
    </div>
  </main>

  <footer>
    <p class="mb-1">&copy; 2026 The Celtic Couple. All rights reserved.</p>
    <p class="mb-0">Designed by <a href="https://cleandesignuk.com/" target="_blank">Clean Design UK</a></p>
  </footer>
</body>
</html>
